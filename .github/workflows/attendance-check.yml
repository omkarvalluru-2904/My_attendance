name: ERP Attendance Checker

on:
  workflow_dispatch:
  schedule:
    # Every 3 hours
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  check-attendance:
    runs-on: ubuntu-latest
    env:
      ERP_LOGIN_URL: ${{ secrets.ERP_LOGIN_URL }}
      ERP_ATTENDANCE_URL: ${{ secrets.ERP_ATTENDANCE_URL }}
      ERP_USERNAME: ${{ secrets.ERP_USERNAME }}
      ERP_PASSWORD: ${{ secrets.ERP_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HEADLESS: true
      ALWAYS_NOTIFY: false
      TIMEZONE: Asia/Kolkata
      STATE_FILE: attendance_state.json

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run attendance check
        run: python check_attendance_once.py

      - name: Commit state snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add attendance_state.json
          git diff --cached --quiet || git commit -m "chore: update attendance state"
          git push
